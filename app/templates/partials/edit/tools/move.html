<section id="toolPanelMove" class="tool-panel">
  <h3>Move Pages</h3>
  <p>Move selected pages as one block while preserving their order.</p>

  <label>
    Pages to move
    <input id="movePages" placeholder="Example: 2,4-5">
  </label>

  <label>
    Position
    <select id="movePosition">
      <option value="after">After page</option>
      <option value="before">Before page</option>
      <option value="end">At the end</option>
    </select>
  </label>

  <label>
    Target page
    <input id="moveTargetPage" type="number" min="1" value="1">
  </label>

  <button type="button" id="addMovePagesOp" class="primary width-full">Move Pages</button>
</section>
