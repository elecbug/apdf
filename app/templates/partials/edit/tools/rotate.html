<section id="toolPanelRotate" class="tool-panel">
  <h3>Rotate Pages</h3>
  <p>Rotate selected pages. Use comma-separated page numbers or ranges.</p>

  <label>
    Pages
    <input id="rotatePages" placeholder="Example: 1,3-5">
  </label>

  <label>
    Angle
    <select id="rotateAngle">
      <option value="90">90° clockwise</option>
      <option value="180">180°</option>
      <option value="270">270° clockwise</option>
    </select>
  </label>

  <button type="button" id="addRotateOp" class="primary width-full">Add Rotate</button>
</section>
