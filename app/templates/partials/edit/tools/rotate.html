<section id="toolPanelRotate" class="tool-panel">
  <h3>Rotate Pages</h3>
  <p>Rotate selected pages. Use comma-separated page numbers, ranges, open ranges, or all. Empty means all.</p>

  <label>
    Pages
    <input id="rotatePages" placeholder="Example: all, 1, 3-5, 10-, -40">
  </label>

  <label>
    Angle
    <select id="rotateAngle">
      <option value="90">90° clockwise</option>
      <option value="180">180°</option>
      <option value="270">270° clockwise</option>
    </select>
  </label>

  <button type="button" id="addRotateOp" class="primary width-full">Apply Rotation</button>
</section>
