<section id="toolPanelText" class="tool-panel">
  <h3>Add Text</h3>
  <p>Click the PDF preview to set the text position, or drag a box to set position and wrap width.</p>

  <label>
    Text
    <textarea id="textOverlayText" rows="3" placeholder="Text to insert"></textarea>
  </label>

  <div class="coordinate-fields">
    <label>
      Page
      <input id="textOverlayPage" type="number" min="1" value="1">
    </label>

    <label>
      X
      <input id="textOverlayX" type="number" step="0.1" placeholder="Click preview">
    </label>

    <label>
      Y
      <input id="textOverlayY" type="number" step="0.1" placeholder="Click preview">
    </label>
  </div>

  <p id="textOverlayCoordinateHint" class="tool-hint">
    Select this tool, then click the preview to fill page, X, and Y, or drag a box to fill page, X, Y, and max width.
  </p>

  <label>
    Max width (pt)
    <input id="textOverlayMaxWidth" type="number" min="0.1" step="0.1" placeholder="Optional drag width">
  </label>

  <label>
    Font size
    <input id="textOverlayFontSize" type="number" min="1" max="300" value="14">
  </label>

  <label>
    Text color
    <input id="textOverlayColor" type="color" value="#000000">
  </label>

  <label>
    Opacity
    <input id="textOverlayOpacity" type="number" min="0" max="1" step="0.05" value="1">
  </label>

  <label class="checkbox-label">
    <input id="textOverlayClearAfterApply" type="checkbox">
    Clear text after adding
  </label>

  <button type="button" id="addTextOverlayOp" class="primary width-full">Add Text</button>
</section>
