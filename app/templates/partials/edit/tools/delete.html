<section id="toolPanelDelete" class="tool-panel">
  <h3>Delete Pages</h3>
  <p>Delete selected pages. Use comma-separated page numbers, ranges, open ranges, or all. Empty means all, but deleting every page is not allowed.</p>

  <label>
    Pages
    <input id="deletePages" placeholder="Example: 1, 3-5, 10-, -40, all">
  </label>

  <button type="button" id="addDeletePagesOp" class="primary width-full">Delete Pages</button>
</section>
