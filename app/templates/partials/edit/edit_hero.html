<section id="editPdfDropZone" class="card edit-hero drop-zone">
  <div>
    <h2>Edit PDF</h2>
    <p>Load a PDF by choosing a file or dragging it onto this section, then apply edit tools.</p>
  </div>

  <div class="upload-box edit-upload-box">
    <div class="file-picker">
      <input id="editPdfFile" class="file-input" type="file" accept="application/pdf">
      <label for="editPdfFile" class="button-like primary file-button">Choose PDF to Edit</label>
    </div>

    <p id="editStatusLine" class="status-line">No PDF loaded. Drag a PDF here to edit.</p>
  </div>
</section>
