<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>APDF</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main>
    <header>
      <h1>APDF</h1>
      <p>Internal PDF utility: merge, split, extract, rotate, delete, overlay.</p>
    </header>

    <section class="card">
      <h2>Find Result</h2>
      <form action="/lookup" method="post" class="row">
        <input name="code" placeholder="8-letter code" maxlength="12" required>
        <button>Open</button>
      </form>
    </section>

    <section class="grid">
      <form class="card" action="/merge" method="post" enctype="multipart/form-data">
        <h2>Merge PDFs</h2>
        <input type="file" name="files" accept="application/pdf" multiple required>
        <button>Merge</button>
      </form>

      <form class="card" action="/extract" method="post" enctype="multipart/form-data">
        <h2>Extract Pages</h2>
        <input type="file" name="file" accept="application/pdf" required>
        <input name="pages" placeholder="1-5,8,10" required>
        <button>Extract</button>
      </form>

      <form class="card" action="/split" method="post" enctype="multipart/form-data">
        <h2>Split PDF</h2>
        <input type="file" name="file" accept="application/pdf" required>
        <textarea name="ranges" placeholder="1-10&#10;11-20&#10;21-30"></textarea>
        <button>Split</button>
      </form>

      <form class="card" action="/delete" method="post" enctype="multipart/form-data">
        <h2>Delete Pages</h2>
        <input type="file" name="file" accept="application/pdf" required>
        <input name="pages" placeholder="2,5,10-20" required>
        <button>Delete</button>
      </form>

      <form class="card" action="/rotate" method="post" enctype="multipart/form-data">
        <h2>Rotate Pages</h2>
        <input type="file" name="file" accept="application/pdf" required>
        <input name="pages" placeholder="1-3,5" required>
        <select name="angle">
          <option value="90">90°</option>
          <option value="180">180°</option>
          <option value="270">270°</option>
        </select>
        <button>Rotate</button>
      </form>

      <form class="card" action="/overlay/text" method="post" enctype="multipart/form-data">
        <h2>Text Overlay</h2>
        <input type="file" name="file" accept="application/pdf" required>
        <input name="page" type="number" min="1" value="1" required>
        <textarea name="text" placeholder="Text" required></textarea>
        <div class="row"><input name="x" type="number" step="0.1" placeholder="X" required><input name="y" type="number" step="0.1" placeholder="Y from top" required></div>
        <div class="row"><input name="font_size" type="number" value="12"><input name="opacity" type="number" step="0.1" min="0" max="1" value="1"></div>
        <button>Apply Text</button>
      </form>

      <form class="card" action="/overlay/image" method="post" enctype="multipart/form-data">
        <h2>Image Overlay</h2>
        <input type="file" name="file" accept="application/pdf" required>
        <input type="file" name="image" accept="image/*" required>
        <input name="page" type="number" min="1" value="1" required>
        <div class="row"><input name="x" type="number" step="0.1" placeholder="X" required><input name="y" type="number" step="0.1" placeholder="Y from top" required></div>
        <div class="row"><input name="width" type="number" step="0.1" placeholder="Width" required><input name="height" type="number" step="0.1" placeholder="Height, 0=auto" value="0"></div>
        <input name="opacity" type="number" step="0.1" min="0" max="1" value="1">
        <button>Apply Image</button>
      </form>
    </section>
  </main>
</body>
</html>
