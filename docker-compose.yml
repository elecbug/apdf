services:
  apdf:
    build: .
    container_name: apdf
    ports:
      - "8080:8000"
    volumes:
      - ./data:/app/data
      - ./fonts:/app/fonts:ro
    restart: unless-stopped
    environment:
      APDF_JOB_EXPIRE_SECONDS: "7200"
      APDF_MAX_INLINE_BYTES: "10485760"
      APDF_MAX_INLINE_PAGES: "200"
